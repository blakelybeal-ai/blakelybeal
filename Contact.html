<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blakely Beal – Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f6f3ee;
      --ink: #1c1b19;
      --mid: #7a7570;
      --light: #d0cbc4;
      --sidebar-width: 200px;
    }

    html, body { height: 100%; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 16px;
      line-height: 1.5;
    }

    /* ── LEFT SIDEBAR ── */
    aside {
      position: fixed;
      top: 0; left: 0;
      width: var(--sidebar-width);
      height: 100vh;
      padding: 48px 32px;
      display: flex;
      flex-direction: column;
      z-index: 100;
      background: var(--cream);
    }

    .site-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 1.05rem;
      letter-spacing: 0.01em;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 32px;
      display: block;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
      list-style: none;
    }

    nav a {
      font-size: 0.9rem;
      text-decoration: none;
      color: var(--mid);
      transition: color 0.2s;
      display: block;
    }

    nav a:hover { color: var(--ink); }
    nav a.active { color: var(--ink); }

    /* ── MAIN CONTENT ── */
    /* Fixed panel that starts exactly where sidebar ends and fills to right edge */
    main {
      position: fixed;
      top: 0;
      left: var(--sidebar-width);
      right: 0;
      bottom: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 48px;
      
    }

    .contact-wrap {
      display: flex;
      flex-direction: column;
      gap: 40px;
      width: 300px;
      padding-bottom: 200px;
    }

    .section-label {
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 14px;
    }

    .contact-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .contact-block p {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--ink);
    }

    .contact-block a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--light);
      transition: border-color 0.2s;
    }

    .contact-block a:hover { border-color: var(--ink); }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--light);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      aside {
        position: relative;
        width: 100%;
        height: auto;
        padding: 28px 24px 20px;
        border-bottom: 1px solid var(--light);
      }
      main {
        position: relative;
        left: 0;
        padding: 32px 24px 60px;
        justify-content: flex-start;
        align-items: flex-start;
      }
      nav { flex-direction: row; flex-wrap: wrap; gap: 8px 20px; }
    }
  </style>
</head>
<body>

<aside>
  <span class="site-name">Blakely Beal</span>
  <nav>
    <a href="index.html">Paintings</a>
    <a href="About.html">About</a>
    <a href="CV.html">CV</a>
    <a href="Contact.html" class="active">Contact</a>
  </nav>
</aside>

<main>
  <div class="contact-wrap">

    <div class="contact-block">
      <div class="section-label">Email</div>
      <p><a href="mailto:BlakelyBeal@gmail.com">BlakelyBeal@gmail.com</a></p>
    </div>

    <div class="divider"></div>

    <div class="contact-block">
      <div class="section-label">Instagram</div>
      <p><a href="https://instagram.com/BlakelysStudio" target="_blank">@BlakelysStudio</a></p>
    </div>

    <div class="divider"></div>

   
    </div>

  </div>
</main>

</body>
</html>
